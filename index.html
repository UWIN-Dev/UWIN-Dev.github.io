<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grow Beyond Earth Astronomy Camp 2026</title>
<style>
  :root {
    --bg: #0b1220;
    --panel: #131c2e;
    --accent: #4fb0ff;
    --text: #e8edf5;
    --muted: #93a1b8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 2rem 1.5rem 1rem;
    text-align: center;
  }
  header h1 {
    margin: 0 0 0.25rem;
    font-size: 1.6rem;
  }
  header p {
    margin: 0;
    color: var(--muted);
    font-size: 0.95rem;
  }
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 1rem 1.5rem 3rem;
  }
  section {
    margin-bottom: 2.5rem;
  }
  h2 {
    font-size: 1.1rem;
    color: var(--accent);
    border-bottom: 1px solid #24304a;
    padding-bottom: 0.5rem;
    margin-bottom: 1rem;
  }
  .latest-card {
    background: var(--panel);
    border-radius: 12px;
    padding: 1rem;
    text-align: center;
  }
  .latest-card img {
    width: 100%;
    max-height: 520px;
    object-fit: contain;
    border-radius: 8px;
    background: #000;
  }
  .latest-caption {
    margin-top: 0.75rem;
    color: var(--muted);
    font-size: 0.9rem;
  }
  .timelapse-card {
    background: var(--panel);
    border-radius: 12px;
    padding: 1rem;
    text-align: center;
  }
  .timelapse-card img {
    width: 100%;
    border-radius: 8px;
    background: #000;
  }
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 0.75rem;
  }
  .gallery a {
    display: block;
    border-radius: 8px;
    overflow: hidden;
    background: var(--panel);
    text-decoration: none;
  }
  .gallery img {
    width: 100%;
    aspect-ratio: 4 / 3;
    object-fit: cover;
    display: block;
  }
  .gallery span {
    display: block;
    font-size: 0.75rem;
    color: var(--muted);
    text-align: center;
    padding: 0.35rem 0;
  }
  .empty-state, .loading-state {
    color: var(--muted);
    text-align: center;
    padding: 2rem 0;
  }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    padding: 1.5rem;
  }
</style>
</head>
<body>

<header>
  <h1>🌱 Grow Beyond Earth - Daily Growth</h1>
  <p>UWIN - Wind Ridge Astronomy Camp 2026 · NASA Grow Beyond Earth Project · one photo every day at noon</p>
</header>

<main>

  <section id="latest-section">
    <h2>Latest Image</h2>
    <div class="latest-card">
      <div id="latest-content" class="loading-state">Loading…</div>
    </div>
  </section>

  <section id="timelapse-section">
    <h2>Timelapse</h2>
    <div class="timelapse-card">
      <img src="timelapse.gif" alt="Growth timelapse" id="timelapse-gif"
           onerror="this.parentElement.innerHTML='<p class=&quot;empty-state&quot;>Timelapse not generated yet — check back after a few days of images.</p>'">
    </div>
  </section>

  <section id="gallery-section">
    <h2>All Daily Images</h2>
    <div id="gallery" class="gallery">
      <div class="loading-state">Loading…</div>
    </div>
  </section>

</main>

<footer>
  Updated automatically once a day. Source: <code>data/manifest.json</code>
</footer>

<script>
async function loadGallery() {
  const latestEl = document.getElementById('latest-content');
  const galleryEl = document.getElementById('gallery');

  try {
    const res = await fetch('data/manifest.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('manifest not found');
    const files = await res.json(); // expected newest-first

    if (!files.length) {
      latestEl.innerHTML = '<p class="empty-state">No images yet — check back after the first capture.</p>';
      galleryEl.innerHTML = '<p class="empty-state">No images yet.</p>';
      return;
    }

    const [latest, ...rest] = files;
    latestEl.innerHTML = `
      <img src="images/${latest}" alt="Latest daily image (${latest})">
      <div class="latest-caption">${latest}</div>
    `;

    galleryEl.innerHTML = files.map(f => `
      <a href="images/${f}" target="_blank" rel="noopener">
        <img src="images/${f}" alt="Image from ${f}" loading="lazy">
        <span>${f.replace(/\.(jpg|jpeg|png)$/i, '')}</span>
      </a>
    `).join('');
  } catch (err) {
    latestEl.innerHTML = '<p class="empty-state">Could not load images yet.</p>';
    galleryEl.innerHTML = '<p class="empty-state">Could not load images yet.</p>';
    console.error(err);
  }
}

loadGallery();
</script>

</body>
</html>
